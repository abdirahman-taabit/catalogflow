name: CatalogFlow CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  frontend-checks:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm audit --audit-level=high
      - run: npm run build

  backend-checks:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: chmod +x mvnw
      - name: Unit, PostgreSQL integration, and package checks
        run: ./mvnw --batch-mode verify

  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check whitespace
        run: git diff --check HEAD
      - name: Check common secret signatures
        shell: bash
        run: |
          if git grep -nEI '(sk_(live|test)_[A-Za-z0-9]{16,}|AKIA[0-9A-Z]{16}|BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY)' -- ':!*.md' ':!package-lock.json'; then
            echo "Potential credential found in tracked files."
            exit 1
          fi
