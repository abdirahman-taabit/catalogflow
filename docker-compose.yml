services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: catalogflow
      POSTGRES_USER: catalogflow
      POSTGRES_PASSWORD: catalogflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalogflow -d catalogflow"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - catalogflow-postgres:/var/lib/postgresql/data

  backend:
    build: ./apps/backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/catalogflow
      DB_USERNAME: catalogflow
      DB_PASSWORD: catalogflow
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  catalogflow-postgres:

